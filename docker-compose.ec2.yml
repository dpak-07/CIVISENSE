services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civisense-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    expose:
      - "5000"
    restart: unless-stopped

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: civisense-ai
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ai_training_data:/app/training_data
      - ai_training_runs:/app/training_runs

  website:
    build:
      context: ./frontend/CIVISENCE-WEBSITE
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: civisense-website
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai_service
    restart: unless-stopped

volumes:
  ai_training_data:
  ai_training_runs:
