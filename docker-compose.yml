name: civisense

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --quiet --eval "try {
            const status = rs.status();
            if (status.ok && status.members.some((member) => member.stateStr === 'PRIMARY')) quit(0);
          } catch (error) {
            try {
              rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]});
            } catch (initError) {}
          }
          quit(1);"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s
    logging: *default-logging

  ai-service:
    build:
      context: ./ai_service
    image: civisense-ai-service:latest
    restart: unless-stopped
    init: true
    environment:
      APP_NAME: "${APP_NAME:-CiviSense AI Decision Engine}"
      ENVIRONMENT: "production"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      MONGO_DB_NAME: "${MONGO_DB_NAME:-civisense}"
      MONGO_COMPLAINTS_COLLECTION: "${MONGO_COMPLAINTS_COLLECTION:-complaints}"
      MONGO_SENSITIVE_LOCATIONS_COLLECTION: "${MONGO_SENSITIVE_LOCATIONS_COLLECTION:-sensitive_locations}"
      MONGO_AI_BLACKLIST_COLLECTION: "${MONGO_AI_BLACKLIST_COLLECTION:-ai_blacklist}"
      MONGO_SERVER_SELECTION_TIMEOUT_MS: "${MONGO_SERVER_SELECTION_TIMEOUT_MS:-5000}"
      MONGO_CONNECT_TIMEOUT_MS: "${MONGO_CONNECT_TIMEOUT_MS:-10000}"
      MONGO_ALLOW_STANDALONE_FALLBACK: "true"
      YOLO_MODEL_NAME: "${YOLO_MODEL_NAME:-yolov8n.pt}"
      YOLO_CONFIDENCE_THRESHOLD: "${YOLO_CONFIDENCE_THRESHOLD:-0.25}"
      YOLO_IMAGE_SIZE: "${YOLO_IMAGE_SIZE:-640}"
      YOLO_MAX_IMAGE_DIMENSION: "${YOLO_MAX_IMAGE_DIMENSION:-1024}"
      YOLO_MIN_CONFIDENCE_FOR_SEVERITY: "${YOLO_MIN_CONFIDENCE_FOR_SEVERITY:-0.4}"
      CPU_THREADS: "${CPU_THREADS:-2}"
      HF_CAPTION_MODEL_NAME: "${HF_CAPTION_MODEL_NAME:-Salesforce/blip-image-captioning-base}"
      HF_CAPTION_MAX_NEW_TOKENS: "${HF_CAPTION_MAX_NEW_TOKENS:-32}"
      HF_CAPTION_NUM_BEAMS: "${HF_CAPTION_NUM_BEAMS:-3}"
      HF_CLIP_MODEL_NAME: "${HF_CLIP_MODEL_NAME:-openai/clip-vit-base-patch32}"
      HF_CLIP_SCORE_WEIGHT: "${HF_CLIP_SCORE_WEIGHT:-3.0}"
      HF_CLIP_MIN_CONFIDENCE: "${HF_CLIP_MIN_CONFIDENCE:-0.28}"
      CIVIC_CLASSIFIER_ENABLED: "${CIVIC_CLASSIFIER_ENABLED:-true}"
      CIVIC_CLASSIFIER_MODEL_PATH: "${CIVIC_CLASSIFIER_MODEL_PATH:-}"
      CIVIC_CLASSIFIER_STATE_FILE: "${CIVIC_CLASSIFIER_STATE_FILE:-training_data/train_state.json}"
      CIVIC_CLASSIFIER_IMAGE_SIZE: "${CIVIC_CLASSIFIER_IMAGE_SIZE:-224}"
      CIVIC_CLASSIFIER_SCORE_WEIGHT: "${CIVIC_CLASSIFIER_SCORE_WEIGHT:-4.2}"
      CIVIC_CLASSIFIER_MIN_CONFIDENCE: "${CIVIC_CLASSIFIER_MIN_CONFIDENCE:-0.5}"
      REASON_NLP_ENABLED: "${REASON_NLP_ENABLED:-true}"
      HF_REASON_MODEL_NAME: "${HF_REASON_MODEL_NAME:-google/flan-t5-small}"
      HF_REASON_MAX_NEW_TOKENS: "${HF_REASON_MAX_NEW_TOKENS:-72}"
      CATEGORY_VALIDATION_REVIEW_CONFIDENCE: "${CATEGORY_VALIDATION_REVIEW_CONFIDENCE:-0.6}"
      IMAGE_DOWNLOAD_TIMEOUT_SECONDS: "${IMAGE_DOWNLOAD_TIMEOUT_SECONDS:-15}"
      IMAGE_MAX_BYTES: "${IMAGE_MAX_BYTES:-10485760}"
      SCHOOL_RADIUS_METERS: "${SCHOOL_RADIUS_METERS:-2000}"
      HOSPITAL_RADIUS_METERS: "${HOSPITAL_RADIUS_METERS:-1400}"
      TRANSIT_RADIUS_METERS: "${TRANSIT_RADIUS_METERS:-1200}"
      GOVERNMENT_RADIUS_METERS: "${GOVERNMENT_RADIUS_METERS:-1000}"
      DUPLICATE_SIMILARITY_THRESHOLD: "${DUPLICATE_SIMILARITY_THRESHOLD:-0.92}"
      DUPLICATE_LOOKBACK_DAYS: "${DUPLICATE_LOOKBACK_DAYS:-7}"
      DUPLICATE_COMPARE_LIMIT: "${DUPLICATE_COMPARE_LIMIT:-50}"
      USER_MISMATCH_BLACKLIST_THRESHOLD: "${USER_MISMATCH_BLACKLIST_THRESHOLD:-3}"
      RETRY_INTERVAL_SECONDS: "${RETRY_INTERVAL_SECONDS:-60}"
      MAX_RETRY_ATTEMPTS: "${MAX_RETRY_ATTEMPTS:-3}"
      RETRY_BATCH_SIZE: "${RETRY_BATCH_SIZE:-25}"
      AWS_REGION: "${AWS_REGION:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_BUCKET_NAME: "${AWS_BUCKET_NAME:-}"
      AWS_S3_ENDPOINT_URL: "${AWS_S3_ENDPOINT_URL:-}"
      AI_OUTPUT_PREFIX: "${AI_OUTPUT_PREFIX:-ai-outputs}"
      AI_MAX_ANNOTATIONS: "${AI_MAX_ANNOTATIONS:-6}"
      AI_MODEL_DISCLAIMER: "${AI_MODEL_DISCLAIMER:-AI result generated by CiviSense models and reviewed through service rules.}"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ai_cache:/home/appuser/.cache
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    logging: *default-logging

  backend:
    build:
      context: ./backend
    image: civisense-backend:latest
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: "production"
      PORT: "5000"
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB_NAME:-civisense}?replicaSet=rs0
      AI_SERVICE_BASE_URL: "http://ai-service:8000"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}"
      JWT_ACCESS_EXPIRES_IN: "${JWT_ACCESS_EXPIRES_IN:-15m}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN:-7d}"
      CORS_ORIGIN: "${CORS_ORIGIN:?Set CORS_ORIGIN in .env}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-900000}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-200}"
      AWS_REGION: "${AWS_REGION:?Set AWS_REGION in .env}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:?Set AWS_ACCESS_KEY_ID in .env}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:?Set AWS_SECRET_ACCESS_KEY in .env}"
      AWS_BUCKET_NAME: "${AWS_BUCKET_NAME:?Set AWS_BUCKET_NAME in .env}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      CONTACT_TO_EMAIL: "${CONTACT_TO_EMAIL:-}"
      MISUSE_REPORT_THRESHOLD: "${MISUSE_REPORT_THRESHOLD:-3}"
      PRIORITY_ESCALATE_INTERVAL_MS: "${PRIORITY_ESCALATE_INTERVAL_MS:-1800000}"
      PRIORITY_ESCALATE_UNPROCESSED_DAY1: "${PRIORITY_ESCALATE_UNPROCESSED_DAY1:-1}"
      PRIORITY_ESCALATE_UNPROCESSED_DAY2: "${PRIORITY_ESCALATE_UNPROCESSED_DAY2:-2}"
      PRIORITY_ESCALATE_INPROGRESS_DAY1: "${PRIORITY_ESCALATE_INPROGRESS_DAY1:-3}"
      PRIORITY_ESCALATE_INPROGRESS_DAY2: "${PRIORITY_ESCALATE_INPROGRESS_DAY2:-5}"
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_started
    expose:
      - "5000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  frontend:
    build:
      context: ./frontend/CIVISENCE-WEBSITE
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    image: civisense-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

volumes:
  mongo_data:
  ai_cache:
