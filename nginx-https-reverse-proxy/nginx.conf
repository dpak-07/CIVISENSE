events {
  worker_connections 1024;
}

http {
  upstream backend {
    server backend:5000;
  }
  
  upstream ai_service {
    server ai-service:8000;
  }
  
  server {
    listen 80;
    server_name civisence.duckdns.org www.civisensce.duckdns.org;
    
    # Redirect HTTP to HTTPS
    location / {
      return 301 https://$server_name$request_uri;
    }
  }
  
  server {
    listen 443 ssl http2;
    server_name civisence.duckdns.org civisence.duckdns.org;
    
    ssl_certificate /etc/letsencrypt/live/civisence.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/civisence.duckdns.org/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/ {
      proxy_pass http://backend:5000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /ai/ {
      proxy_pass http://ai-service:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
